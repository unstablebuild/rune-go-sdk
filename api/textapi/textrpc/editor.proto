syntax = "proto3";

option go_package = "github.com/unstablebuild/rune-go-sdk/api/textapi/textrpc";

package text;

import "term/termrpc/term.proto";

message URI {
	string uri = 1;
}

message EditRequest {
	URI resource_name = 1;
	repeated term.CellRow buffer = 2;
	bool read_only = 3;
	bool recovered = 4;
}

message EditResponse {
}

message EditorEvent {
  enum Type {
	TypeOpen = 0;
	TypeClose = 1;
	TypeFlush = 2;
	TypeEdit = 3;
	TypeScroll = 5;
	TypeCreate = 12;
	TypeChange = 13;
	TypeFocus = 6;
	TypeUnfocus = 7;
	TypeCursor = 8;
	TypeSelection = 9;
	TypeRename = 10;
	TypeRemove = 11;
	TypeHidden = 14;
	TypeVisible = 15;
  }

  Type type = 1;
  URI resource_name = 2;

  term.Coordinates start = 4;
  term.Coordinates end = 5;
  term.Coordinates from = 6;
  term.Coordinates to = 7;
  string content = 8;
}

message SubscribeEventRequest {
	repeated EditorEvent.Type type = 1;
	bool unsubscribe = 3;
}

message SetLocationListRequest {
	message Location {
		term.Coordinates from = 1;
		term.Coordinates to = 2;
		term.Attributes attr = 3;
		string msg = 4;
		string icon = 5;
	}
    URI resource_name = 1;
	string list_id = 2;
	repeated Location locations = 3;
	uint32 priority = 4;
}

message SetLocationListResponse {}

message EditCellRequest {
	URI resource_name = 1;
	term.Coordinates start = 2;
	term.Coordinates end = 3;
	string str = 4;
}

message EditCellResponse {
	term.Coordinates from = 1;
	term.Coordinates to = 2;
	string old = 3;
}

message RawCellsRequest {
    URI resource_name = 1;
}

message RawCellsResponse {
	repeated term.CellRow rows = 1;
}

message MoveToLocationRequest {
    URI resource_name = 1;
	string list_id = 2;
}

message MoveToLocationResponse {
}

message SetCursorRequest {
	term.Coordinates pos = 1;
    URI resource_name = 2;
}

message SetCursorResponse {
}

message CursorRequest {
    URI resource_name = 1;
}

message CursorResponse {
	term.Coordinates pos = 1;
}

message EditorRequest {
	URI resource_name = 1;
}

message EditorResponse {
}

message SetDefaultAttributesRequest {
    URI resource_name = 1;
	term.Attributes attributes = 2;
}

message SetDefaultAttributesResponse {
}

service Editor {
	rpc Edit(EditRequest) returns (EditResponse);
	rpc SetCursor(SetCursorRequest) returns (SetCursorResponse);
	rpc Cursor(CursorRequest) returns (CursorResponse);
	rpc Editor(EditorRequest) returns (EditorResponse);

	// locations
	rpc SetLocationList(SetLocationListRequest) returns (SetLocationListResponse);
	rpc MoveToNextLocation(MoveToLocationRequest) returns (MoveToLocationResponse);
	rpc MoveToPrevLocation(MoveToLocationRequest) returns (MoveToLocationResponse);


	// Editor
	rpc EditCell(EditCellRequest) returns (EditCellResponse);

	// View
	rpc RawCells(RawCellsRequest) returns (RawCellsResponse);

	rpc SetDefaultAttributes(SetDefaultAttributesRequest) returns (SetDefaultAttributesResponse);

	// streams
	rpc SubscribeEvent(stream SubscribeEventRequest) returns (stream EditorEvent);
}
