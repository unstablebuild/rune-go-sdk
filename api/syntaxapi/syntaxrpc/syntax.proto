syntax = "proto3";

option go_package = "github.com/unstablebuild/rune-go-sdk/api/syntaxapi/syntaxrpc";

package syntax;

import "term/termrpc/term.proto";

message SearchRequest {
    string query = 1;
    repeated string capture_names = 2;
    repeated string languages = 3;
}

message SearchNodeRequest {
    // Bitflags of node capture types to search for.
    // Values: Scope=1, DefinitionNamespace=2, Reference=4, DefinitionFunc=8,
    //         DefinitionVar=16, DefinitionMethod=32, DefinitionType=64
    uint32 node_types = 1;
    // Optional language identifiers (e.g. "go", "python") that restrict the
    // search to files of those languages. Empty searches all languages.
    repeated string languages = 2;
}

message QueryRequest {
    string uri = 1;
    string query = 2;
    repeated string capture_names = 3;
}

message QueryNodeRequest {
    string uri = 1;
    // Bitflags of node capture types to search for.
    // Values: Scope=1, DefinitionNamespace=2, Reference=4, DefinitionFunc=8,
    //         DefinitionVar=16, DefinitionMethod=32, DefinitionType=64
    uint32 node_types = 2;
}

message SearchResponse {
    string uri = 1;
    string text = 2;
    reserved 3;
    term.Coordinates from = 4;
    term.Coordinates to = 5;
    string capture_name = 6;
}

message HighlightRequest {
    string uri = 1;
    string content = 2;
}

message HighlightResponse {
    term.Coordinates from = 1;
    term.Coordinates to = 2;
    term.Attributes attr = 3;
    string message = 4;
}

message ResolveSymbolRequest {
    string name = 1;
}

message ResolveSymbolMatch {
    string uri = 1;
    // 0-based line and character of the symbol.
    uint32 line = 2;
    uint32 character = 3;
    string display = 4;
    string import_path = 5;
}

message ResolveSymbolProgress {
    string message = 1;
    int64 found = 2;
    int64 step = 3;
    int64 total = 4;
}

message ResolveSymbolResponse {
    oneof payload {
        ResolveSymbolMatch match = 1;
        ResolveSymbolProgress progress = 2;
    }
}

message ListReferencedSymbolsRequest {}

message ListReferencedSymbolsResponse {
    string name = 1;
}

service Syntax {
    rpc Search(SearchRequest) returns (stream SearchResponse);
    rpc SearchNode(SearchNodeRequest) returns (stream SearchResponse);
    rpc Query(QueryRequest) returns (stream SearchResponse);
    rpc QueryNode(QueryNodeRequest) returns (stream SearchResponse);
    rpc Highlight(HighlightRequest) returns (stream HighlightResponse);
    rpc ResolveSymbol(ResolveSymbolRequest) returns (stream ResolveSymbolResponse);
    rpc ListReferencedSymbols(ListReferencedSymbolsRequest) returns (stream ListReferencedSymbolsResponse);
}
