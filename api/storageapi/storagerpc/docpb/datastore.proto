syntax = "proto3";
option go_package = "/docpb";

package proto;

message CreateDocumentRequest {
	string id = 1;
	bytes data = 2;
}

message SetDocumentRequest {
	string id = 1;
	bytes data = 2;
}

message UpdateDocumentRequest {
	string id = 1;

	message Field {
		repeated string field_path = 1;
		bytes data = 2;
	}

	repeated Field updates = 2;
	repeated Field preconditions = 3;
}

message GetDocumentRequest {
	string id = 1;
}

message DeleteDocumentRequest {
	string id = 1;
}

message ListDocumentRequest {
	message Filter {
		repeated string field_path = 1;
		bytes data = 2;
		string operation = 3;
	}

	repeated Filter filters = 1;
	repeated string fields = 2;
}

message DocumentResponse {
}

message GetDocumentResponse {
	bytes data = 1;
	bool not_found = 2;
}
message ListDocumentResponse {
	bytes data = 1;
	string error = 2;
}
message CreateDocumentResponse {
	bool already_exists = 1;
}
message UpdateDocumentResponse {
	bool not_found = 1;
	bool precondition_failed = 2;
}

service DocumentStore {
	// Create, Set, Update and Get stream their document payload so a single
	// document can exceed the gRPC per-message size limit. The blob is split
	// into chunks; identity/metadata travels on the first stream message only:
	//
	//   Create/Set:  first message carries id; every message carries a data
	//                chunk. The server concatenates chunks before decoding.
	//   Update:      first message carries id; updates/preconditions are
	//                streamed across messages and concatenated by field path.
	//   Get:         the response is streamed. The first message may carry
	//                not_found; otherwise N messages each carry a data chunk
	//                that the client concatenates before decoding.
	rpc Create(stream CreateDocumentRequest) returns (CreateDocumentResponse);
	rpc Set(stream SetDocumentRequest) returns (DocumentResponse);
	rpc Update(stream UpdateDocumentRequest) returns (UpdateDocumentResponse);
	rpc Get(GetDocumentRequest) returns (stream GetDocumentResponse);
	rpc Delete(DeleteDocumentRequest) returns (DocumentResponse);
	rpc List(ListDocumentRequest) returns (stream ListDocumentResponse);
}
